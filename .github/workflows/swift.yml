---
name: Swift
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Verify Swift version
        run: swift --version
      # Build the package and the test bundle. We can't run `swift test`
      # here: GitHub's `macos-latest` image is macOS 14/15, but the package
      # has `.macOS("26.0")` and the auto-generated Foundation bridges call
      # macOS-26-only APIs unconditionally — so the test xctest bundle is
      # built for macOS 26 and dyld refuses to load it on the runner.
      # Tests are exercised on a developer machine with macOS 26 instead.
      - name: Build (macOS)
        run: swift build --build-tests -v

  build-ios:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Build (iOS) — library targets only
        run: |
          xcodebuild \
            -scheme SwiftScriptInterpreter \
            -destination 'generic/platform=iOS' \
            -skipPackagePluginValidation \
            build

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      # Bumped from 6.0 → 6.3 to stay aligned with the swift-foundation
      # revision the scl extract is generated from. Older toolchains'
      # bundled Foundation lags behind scl's HEAD and trips bridge
      # entries that scl reports as cross-platform.
      image: swift:6.3-jammy
    steps:
      - uses: actions/checkout@v6
      - name: Verify Swift version
        run: swift --version
      - name: Build (Linux)
        run: swift build --build-tests -v
      - name: Test (Linux)
        run: swift test -v --skip-build

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      # SwiftyLab/setup-swift is the unified macOS/Linux/Windows
      # toolchain installer — better-maintained than gha-setup-swift
      # for Windows, supports recent 6.3+ releases that fix the
      # `cyclic dependency in module 'ucrt'` issue swift-syntax hit
      # on 6.0.3.
      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3"
      - name: Verify Swift version
        run: swift --version
      - name: Build (Windows)
        run: swift build --build-tests -v
        continue-on-error: true
      - name: Test (Windows)
        run: swift test -v --skip-build
        continue-on-error: true
