---
name: Swift
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Verify Swift version
        run: swift --version
      # Build the package and the test bundle. We can't run `swift test`
      # here: GitHub's `macos-latest` image is macOS 14/15, but the package
      # has `.macOS("26.0")` and the auto-generated Foundation bridges call
      # macOS-26-only APIs unconditionally — so the test xctest bundle is
      # built for macOS 26 and dyld refuses to load it on the runner.
      # Tests are exercised on a developer machine with macOS 26 instead.
      - name: Build (macOS)
        run: swift build --build-tests -v

  build-ios:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Build (iOS) — library targets only
        run: |
          xcodebuild \
            -scheme SwiftScriptInterpreter \
            -destination 'generic/platform=iOS' \
            -skipPackagePluginValidation \
            build

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: swift:6.0-jammy
    steps:
      - uses: actions/checkout@v6
      - name: Verify Swift version
        run: swift --version
      - name: Build (Linux)
        run: swift build --build-tests -v
      - name: Test (Linux)
        run: swift test -v --skip-build

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      # gha-setup-swift handles toolchain install + PATH on Windows.
      # Pinning a specific 6.x release keeps cache hits stable; bump
      # when refreshing toolchain.
      - name: Setup Swift
        uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-6.0.3-release
          tag: 6.0.3-RELEASE
      - name: Verify Swift version
        run: swift --version
      - name: Build (Windows)
        run: swift build --build-tests -v
      - name: Test (Windows)
        run: swift test -v --skip-build
