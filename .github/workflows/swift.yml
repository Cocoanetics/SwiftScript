---
name: Swift
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Verify Swift version
        run: swift --version
      # Build the package and the test bundle. We can't run `swift test`
      # here: GitHub's `macos-latest` image is macOS 14/15, but the package
      # has `.macOS("26.0")` and the auto-generated Foundation bridges call
      # macOS-26-only APIs unconditionally — so the test xctest bundle is
      # built for macOS 26 and dyld refuses to load it on the runner.
      # Tests are exercised on a developer machine with macOS 26 instead.
      - name: Build (macOS)
        run: swift build --build-tests -v

  build-ios:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Build (iOS) — library targets only
        run: |
          xcodebuild \
            -scheme SwiftScriptInterpreter \
            -destination 'generic/platform=iOS' \
            -skipPackagePluginValidation \
            build

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: swift:6.0-jammy
    steps:
      - uses: actions/checkout@v6
      - name: Verify Swift version
        run: swift --version
      - name: Build (Linux)
        run: swift build --build-tests -v
      - name: Test (Linux)
        run: swift test -v --skip-build
